<div class="card" style="margin-bottom: 20px;">
  <h2>💰 1억 모으기 플랜</h2>
  
  <div class="input-group">
    <label>이번 달 월급</label>
    <input type="tel" id="app100m_s" placeholder="예: 3,000,000">
  </div>
  
  <div class="input-group">
    <label>사용할 생활비</label>
    <input type="tel" id="app100m_l" placeholder="예: 1,000,000">
  </div>
  
  <div style="display: flex; gap: 15px;">
    <div class="input-group" style="flex:1;">
      <label>일반투자 비율(%)</label>
      <input type="tel" id="app100m_ir" value="80">
    </div>
    <div class="input-group" style="flex:1;">
      <label>코인 비율(%)</label>
      <input type="tel" id="app100m_cr" value="20">
    </div>
  </div>

  <div class="res-box">
    <div class="res-item">
      <span>🛡️ 보험 (고정)</span>
      <span class="amt fixed">- 90,000원</span>
    </div>
    <div class="res-item">
      <span>👥 회비 (고정)</span>
      <span class="amt fixed">- 50,000원</span>
    </div>
    <div class="res-item">
      <span>🏦 저축 (청약)</span>
      <span class="amt fixed">- 150,000원</span>
    </div>
    
    <div class="calc-divider"></div>
    
    <div class="res-item">
      <span>🏢 일반 투자</span>
      <span class="amt" id="app100m_ri">0원</span>
    </div>
    <div class="res-item">
      <span>🪙 코인 투자</span>
      <span class="amt" id="app100m_rc">0원</span>
    </div>
    
    <div class="calc-divider"></div>
    
    <div class="res-item total-invest">
      <span>🔥 투자 가능 금액</span>
      <span class="amt total-amt" id="app100m_rt">0원</span>
    </div>
  </div>
</div>
